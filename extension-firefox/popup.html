<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
    }
    h2 {
      margin: 0 0 4px 0;
      font-size: 16px;
      color: #89b4fa;
    }
    .badge {
      font-size: 10px;
      color: #fab387;
      margin-bottom: 12px;
      display: block;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #313244;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f38ba8;
    }
    .dot.connected { background: #a6e3a1; }
    .status-text { font-size: 13px; }

    h3 {
      font-size: 13px;
      color: #89b4fa;
      margin: 16px 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .channel-setup {
      background: #313244;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .channel-setup label {
      font-size: 12px;
      color: #a6adc8;
      display: block;
      margin-bottom: 4px;
    }
    .channel-row {
      display: flex;
      gap: 8px;
    }
    .channel-row input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #45475a;
      color: #cdd6f4;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .channel-row input:focus { border-color: #89b4fa; }
    .channel-row button {
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }
    .channel-row button:hover { background: #74c7ec; }

    .current-channel {
      font-size: 13px;
      padding: 6px 10px;
      background: #1e1e2e;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .current-channel.active { display: block; }
    .current-channel .label { color: #6c7086; }
    .current-channel .value { color: #a6e3a1; font-weight: 600; }

    .tab-list { margin-top: 8px; }
    .tab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #313244;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }
    .tab-channel {
      background: #89b4fa;
      color: #1e1e2e;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }
    .tab-channel.none {
      background: #45475a;
      color: #6c7086;
    }

    .info {
      font-size: 11px;
      color: #6c7086;
      margin-top: 12px;
      line-height: 1.4;
    }
    code {
      background: #313244;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h2>Claude → Gemini Bridge</h2>
  <span class="badge">Firefox Edition</span>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <div class="channel-setup">
    <label>Assign channel to this Gemini tab:</label>
    <div class="channel-row">
      <input type="text" id="channelInput" placeholder="e.g. project-a, backend">
      <button id="assignBtn">Assign</button>
    </div>
    <div class="current-channel" id="currentChannel">
      <span class="label">Current: </span><span class="value" id="currentChannelName"></span>
    </div>
  </div>

  <h3>Active Gemini Tabs</h3>
  <div class="tab-list" id="tabList">Loading...</div>

  <div class="info">
    Send from terminal: <code>chat.sh -c channel-name "msg"</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
